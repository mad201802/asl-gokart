# Reusable workflow — Headunit test & build
# Called by ci-headunit.yml and ci-release.yml

name: Headunit

on:
    workflow_call:
        inputs:
            is-tag:
                description: Whether this run was triggered by a version tag
                type: boolean
                required: true
            is-pr:
                description: Whether this run was triggered by a pull request
                type: boolean
                required: true

jobs:
    test:
        name: Unit Tests
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: infotainment/headunit
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6.2.0
              with:
                  node-version: 22

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest
                  registries: |
                      https://registry.npmjs.org/
                      @asl-gokart:https://registry.leotm.de/

            - name: Install dependencies
              run: bun install

            - name: Run unit tests
              run: bun run test:unit

    build-x86:
        name: Build (x86_64)
        runs-on: ubuntu-latest
        needs: test
        if: inputs.is-pr || inputs.is-tag
        defaults:
            run:
                working-directory: infotainment/headunit
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6.2.0
              with:
                  node-version: 22

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest
                  registries: |
                      https://registry.npmjs.org/
                      @asl-gokart:https://registry.leotm.de/

            - name: Install dependencies
              run: bun install

            - name: Build (x86_64)
              run: bun run make

            - name: Upload artifact
              uses: actions/upload-artifact@v7
              with:
                  name: headunit-deb-x86
                  path: infotainment/headunit/out/make/deb/**/*.deb
                  retention-days: 7

    build-arm64:
        name: Build (arm64)
        runs-on: ubuntu-latest
        needs: test
        if: inputs.is-tag
        defaults:
            run:
                working-directory: infotainment/headunit
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6.2.0
              with:
                  node-version: 22

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest
                  registries: |
                      https://registry.npmjs.org/
                      @asl-gokart:https://registry.leotm.de/

            - name: Install arm64 cross-compilation toolchain
              run: |
                  sudo apt-get update -qq
                  sudo apt-get install -y --no-install-recommends gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

            - name: Install dependencies
              run: bun install

            - name: Build (arm64)
              env:
                  CC: aarch64-linux-gnu-gcc
                  CXX: aarch64-linux-gnu-g++
              run: bun run make:pi4

            - name: Upload artifact
              uses: actions/upload-artifact@v7
              with:
                  name: headunit-deb-arm64
                  path: infotainment/headunit/out/make/deb/arm64/*.deb
