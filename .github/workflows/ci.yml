    #           with:
    #               path: analytics/node_modules
    #               key: analytics-node-modules-${{ hashFiles('analytics/package.json') }}
    #               restore-keys: analytics-node-modules-

    #         - name: Install dependencies
    #           run: npm install

    #         # SKIP_ENV_VALIDATION bypasses t3-oss/env-nextjs runtime validation
    #         # so the build does not require live secrets (InfluxDB, Auth, etc.)
    #         - name: Build
    #           run: npm run build
    #           env:
    #               SKIP_ENV_VALIDATION: '1'

    #         - name: Lint & typecheck
    #           run: npm run check
    #           env:
    #               SKIP_ENV_VALIDATION: '1'

    # ──────────────────────────────────────────────────────────────────────────
    # RELEASE  (tags only — runs after all jobs succeed)
    # ──────────────────────────────────────────────────────────────────────────

    release:
        name: Create GitHub Release
        runs-on: ubuntu-latest
        needs:
            - headunit-build-arm64
            - headunit-build-x86
            - zc-build
            # - analytics
        if: startsWith(github.ref, 'refs/tags/')
        permissions:
            contents: write
        steps:
            - name: Download headunit arm64 artifact
              uses: actions/download-artifact@v4
              with:
                  name: headunit-deb-arm64
                  path: release-assets/

            - name: Download headunit x86_64 artifact
              uses: actions/download-artifact@v4
              with:
                  name: headunit-deb-x86
                  path: release-assets/

            - name: Download ZC firmware artifacts
              uses: actions/download-artifact@v4
              with:
                  name: zc-firmware
                  path: release-assets/

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  files: release-assets/**
                  generate_release_notes: true
