name: CI (headunit)
env:
    WORKING_DIRECTORY: 'infotainment/headunit'
'on':
    push:
        paths:
            - 'infotainment/headunit/**'
            - '!infotainment/headunit/**/*.md'
            - '!infotainment/headunit/LICENSE'
            - '!infotainment/headunit/**/*.gitignore'
    pull_request:
        paths:
            - 'infotainment/headunit/**'
            - '!infotainment/headunit/**/*.md'
            - '!infotainment/headunit/LICENSE'
            - '!infotainment/headunit/**/*.gitignore'
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
            - name: Setup node
              uses: actions/setup-node@v6.2.0
              with:
                node-version: 22
            - uses: oven-sh/setup-bun@v2
              with:
                registries: |
                  https://registry.npmjs.org/
                  @asl-gokart:registry=https://registry.leotm.de/
            - name: Install dependencies
              working-directory: ${{ env.WORKING_DIRECTORY }}
              run: bun install
            - name: Build (arm64)
              working-directory: ${{ env.WORKING_DIRECTORY }}
              run: bun run make:pi4
            - name: Upload artifact
              uses: actions/upload-artifact@v5
              with:
                name: headunit-deb-arm64
                path: ${{ env.WORKING_DIRECTORY }}/out/make/deb/arm64/*.deb
  