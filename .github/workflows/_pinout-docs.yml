# Reusable workflow — Zone Controller pinout documentation
# Called by ci-pinout-docs.yml

name: Pinout Docs

on:
    workflow_call:

jobs:
    generate-and-deploy:
        name: Generate & Deploy
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-python@v6
              with:
                  python-version: '3.x'

            - name: Generate pinout documentation
              run: python zc/tools/gen_pinout_docs.py --output-dir docs/

            - name: Upload Pages artifact
              uses: actions/upload-pages-artifact@v5
              with:
                  path: docs/

            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v5
